name: Update Influence Radar Data

on:
  schedule:
    # 매일 한국시간 오전 9시 실행 (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 트리거 옵션

permissions:
  contents: write
  commit-message: 'chore: auto-update influence radar data'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run data update script
        run: |
          cd ${{ github.workspace }}
          python3 update_radar.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "radar-automation@github.com"
          git config --local user.name "Radar Automation"
          git add data.json
          git commit -m "chore: auto-update influence radar - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

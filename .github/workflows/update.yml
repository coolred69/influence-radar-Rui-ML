name: Influence Radar 3.0 - Daily Update

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn numpy pandas
      
      - name: Train ML Model
        run: |
          cd scripts
          python3 train_model.py
      
      - name: Run Backtest
        run: |
          cd scripts
          python3 backtest.py
      
      - name: Generate Predictions
        run: |
          cd scripts
          python3 predict.py
      
      - name: Update Dashboard Data
        run: |
          echo "Dashboard data updated at $(date)" > data/last_update.txt
      
      - name: Commit and Push
        run: |
          git config --local user.email "radar-ml@github.com"
          git config --local user.name "Radar ML Bot"
          git add -A
          git commit -m "chore: daily ML model update & backtest - $(date +'%Y-%m-%d %H:%M')" || true
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  weekly-retrain:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0'  # 일요일만
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn numpy pandas
      
      - name: Full Retraining
        run: |
          cd scripts
          python3 train_model.py --full-retrain
          python3 backtest.py --detailed

name: Update Influence Radar Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run data update script
        run: python3 update_radar.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "radar-automation@github.com"
          git config --local user.name "Radar Automation"
          git add data.json
          git commit -m "auto-update: $(date +'%Y-%m-%d %H:%M')" || true
          git push